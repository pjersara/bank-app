name: CK Metrics

on:
  push:
    branches: [main]

jobs:
  ck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build CK fat jar
        run: |
          git clone https://github.com/mauricioaniche/ck.git ck-src
          cd ck-src
          mvn clean package -DskipTests

      - name: Run CK metrics
        run: |
          mkdir -p ck-output
          java -jar ck-src/target/ck-*-jar-with-dependencies.jar src/main/java false 0 false ck-output

      - name: Upload metrics
        uses: actions/upload-artifact@v4
        with:
          name: ck-output
          path: ck-output
