name: CK Metrics

on:
  push:
    branches: [ main ]

jobs:
  ck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Download CK dependencies
        run: mvn dependency:get -Dartifact=com.github.mauricioaniche:ck:0.7.0

      - name: Build CK classpath
        run: |
          mvn dependency:build-classpath \
            -Dmdep.includeArtifactIds=ck \
            -Dmdep.outputFile=cp.txt

      - name: Run CK
        run: |
          CP=$(cat cp.txt):~/.m2/repository/com/github/mauricioaniche/ck/0.7.0/ck-0.7.0.jar
          java -cp "$CP" com.github.mauricioaniche.ck.CK src/main/java false 0 false ck-output

      - name: Upload CSV
        uses: actions/upload-artifact@v4
        with:
          name: ck-metrics
          path: ck-output
